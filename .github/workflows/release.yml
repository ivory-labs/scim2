name: Release to Maven Central

on:
  push:
    branches:
      - 'fix/cicd'

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all tags for JReleaser

      # Step 2: Set up Java environment
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      # Step 3: Import GPG key for signing
      - name: Import GPG key
        run: |
          echo "${{ secrets.SIGNING_PRIVATE_KEY }}" | base64 --decode | gpg --batch --import

      # Step 4: Ensure Gradle Wrapper version
      - name: Update Gradle Wrapper to 8.3
        run: ./gradlew wrapper --gradle-version=8.3 --distribution-type=bin

      # Step 5: Build and test the project
      - name: Build and Test
        run: ./gradlew clean build test --parallel --stacktrace

      # Step 6: Release to Maven Central with JReleaser
      - name: Release Artifacts to Maven Central
        uses: jreleaser/release-action@v2
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OSSRH_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        with:
          args: full-release

      # Step 7: Upload logs for debugging
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-logs
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
