name: Release to Maven Central

on:
  push:
    tags:
      - 'v*'  # Trigger on version tags

jobs:
  deploy:
    runs-on: ubuntu-latest

    steps:
      # Step 1: Checkout repository
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Fetch all tags for JReleaser

      # Step 2: Set up Java environment
      - name: Set up Java
        uses: actions/setup-java@v4
        with:
          java-version: 21
          distribution: 'temurin'
          cache: gradle

      # Step 3: Import GPG key for signing
      - name: Import GPG key
        run: |
          echo "${{ secrets.SIGNING_PRIVATE_KEY }}" | gpg --batch --import
          echo "GPG_TTY=$(tty)" >> $GITHUB_ENV

      # Step 4: Verify Gradle Wrapper
      - name: Verify Gradle Wrapper
        run: ./gradlew wrapper --gradle-version=8.3 --distribution-type=bin

      # Step 5: Build and test
      - name: Build and Test
        run: ./gradlew build test --stacktrace

      # Step 6: Release with JReleaser
      - name: Release to Maven Central with JReleaser
        uses: jreleaser/release-action@v2
        env:
          JRELEASER_GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          OSSRH_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          OSSRH_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        with:
          args: full-release

      # Step 7: Upload logs for debugging
      - name: Upload logs
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: release-logs
          path: |
            out/jreleaser/trace.log
            out/jreleaser/output.properties
